<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d4a2f"/>
      <stop offset="100%" stop-color="#1a1f14"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="400" cy="360" rx="180" ry="220" fill="#c9a87c"/>
  <ellipse cx="400" cy="330" rx="130" ry="160" fill="#d4b896"/>
  <path d="M280 520 Q400 620 520 520" fill="none" stroke="#8b6914" stroke-width="8"/>
  <rect x="120" y="120" width="560" height="560" fill="none" stroke="#5c4a1f" stroke-width="24" opacity="0.5"/>
  <rect width="800" height="800" filter="url(#grain)" opacity="0.15"/>
</svg>
